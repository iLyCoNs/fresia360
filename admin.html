<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bóveda Administrativa | Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           RESET Y ESTILOS BASE LUXURY
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: #040609; 
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 50%);
            color: #ffffff; 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; padding: 40px 20px; 
            -webkit-font-smoothing: antialiased;
        }
        
        .container { width: 100%; max-width: 1100px; position: relative; z-index: 10; }
        
        /* ==========================================================================
           HEADER DEL PANEL
           ========================================================================== */
        .admin-header { text-align: center; margin-bottom: 40px; animation: fadeInDown 1s ease-out; }
        .admin-header h1 { font-size: 28px; font-weight: 300; letter-spacing: 6px; text-transform: uppercase; background: linear-gradient(to right, #ffffff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .admin-header p { color: #06b6d4; font-size: 10px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* ==========================================================================
           PANTALLA DE LOGIN (GLASSMORPHISM)
           ========================================================================== */
        #login-screen { 
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.08); border-top: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px; padding: 50px 40px; max-width: 420px; margin: 0 auto; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .input-group { margin-bottom: 24px; }
        .input-group label { display: block; font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1.5px;}
        .input-group input { 
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); 
            padding: 14px 18px; border-radius: 12px; color: #fff; font-size: 14px; outline: none; 
            transition: all 0.3s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .input-group input:focus { border-color: #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.2), inset 0 2px 4px rgba(0,0,0,0.2); }
        .input-group input::placeholder { color: rgba(255,255,255,0.2); }

        .btn-submit { 
            width: 100%; background: linear-gradient(135deg, #06b6d4, #0284c7); color: #fff; 
            border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 12px; 
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; 
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.4); margin-top: 10px;
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(6, 182, 212, 0.6); }
        .btn-submit:active { transform: translateY(0); }

        /* ==========================================================================
           PANTALLA DE GESTIÓN (DASHBOARD) & TABS
           ========================================================================== */
        #dashboard-screen { display: none; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .dashboard-controls { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; 
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            padding: 16px 24px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); position: sticky; top: 20px; z-index: 100;
        }
        .user-info { font-size: 11px; color: #94a3b8; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;}
        .user-info b { color: #06b6d4; font-weight: 800; margin-left: 5px; }

        .controls-actions { display: flex; gap: 15px; }
        .btn-logout { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); padding: 10px 16px; border-radius: 10px; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.3s; }
        .btn-logout:hover { background: #ef4444; color: #fff; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);}
        
        .btn-save { background: linear-gradient(135deg, #10b981, #059669); color: #fff; border: none; padding: 10px 24px; border-radius: 10px; font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4); display: flex; align-items: center; gap: 8px;}
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(16, 185, 129, 0.6); }

        /* NAVEGACIÓN POR TABS */
        .tabs-nav { display: flex; gap: 10px; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; overflow-x: auto;}
        .tabs-nav::-webkit-scrollbar { display: none; }
        .tab-btn { background: transparent; border: none; color: #94a3b8; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 10px 20px; cursor: pointer; transition: all 0.3s; border-radius: 12px; white-space: nowrap; }
        .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .tab-btn.active { background: rgba(6, 182, 212, 0.15); color: #06b6d4; box-shadow: inset 0 0 0 1px rgba(6, 182, 212, 0.3); }
        
        .tab-section { display: none; animation: fadeIn 0.5s ease; }
        .tab-section.active { display: block; }

        /* SEARCH BAR */
        .search-bar-container { margin-bottom: 20px; position: relative; }
        .search-bar-container input { width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); padding: 14px 20px 14px 45px; border-radius: 14px; color: #fff; font-size: 13px; outline: none; transition: border 0.3s; backdrop-filter: blur(10px); }
        .search-bar-container input:focus { border-color: #06b6d4; }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #94a3b8; }

        /* CONFIGURACIÓN GLOBAL */
        .global-config-card { background: rgba(255,255,255,0.02); padding: 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;}
        .global-config-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 20px; color: #06b6d4; text-transform: uppercase; letter-spacing: 1px;}

        /* GRID DE LOTES Y PINES */
        .lotes-grid { display: flex; flex-direction: column; gap: 15px; }
        .lote-row { 
            display: flex; flex-wrap: wrap; gap: 20px; 
            background: rgba(255,255,255,0.02); padding: 25px; border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.05); align-items: flex-start; 
            transition: all 0.3s ease; position: relative;
        }
        .lote-row:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }
        
        .lote-header-info { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 80px; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 15px; gap: 5px; }
        .lote-num-input { width: 100%; text-align: center; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 18px; font-weight: 800; padding: 8px 0; outline: none; transition: all 0.3s;}
        .lote-num-input:focus { border-color: #06b6d4; }
        .pin-badge { font-size: 8px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 1px; text-align: center; width: 100%;}
        .badge-lote { background: rgba(59, 130, 246, 0.15); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }
        .badge-360 { background: rgba(168, 85, 247, 0.15); color: #d8b4fe; border: 1px solid rgba(168, 85, 247, 0.3); }
        .badge-horiz { background: rgba(245, 158, 11, 0.15); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }
        
        .lote-details { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .col-span-full { grid-column: 1 / -1; }
        .col-span-2 { grid-column: span 2; }
        
        .lote-field { display: flex; flex-direction: column; gap: 8px; }
        .lote-field label { font-size: 9px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .lote-field input, .lote-field select { 
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 14px; border-radius: 10px; color: #fff; font-size: 13px; font-weight: 600; 
            outline: none; transition: border 0.3s;
        }
        .lote-field input:focus, .lote-field select:focus { border-color: #06b6d4; background: rgba(0,0,0,0.8);}
        .lote-field input::placeholder { color: rgba(255,255,255,0.2); font-weight: 400; font-size: 11px;}
        
        /* ESTILOS DE ESTADO (COLORES) */
        select option { background: #0f172a; color: #fff; }
        .status-disp { color: #10b981 !important; border-color: rgba(16, 185, 129, 0.4) !important; background: rgba(16, 185, 129, 0.05) !important;}
        .status-res { color: #f59e0b !important; border-color: rgba(245, 158, 11, 0.4) !important; background: rgba(245, 158, 11, 0.05) !important;}
        .status-vend { color: #ef4444 !important; border-color: rgba(239, 68, 68, 0.4) !important; background: rgba(239, 68, 68, 0.05) !important;}
        .status-nodisp { color: #94a3b8 !important; border-color: rgba(148, 163, 184, 0.4) !important; background: rgba(148, 163, 184, 0.05) !important;}

        /* ALERTA FLOTANTE (TOAST) */
        #toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px); 
            background: linear-gradient(135deg, #10b981, #059669); color: #fff; padding: 16px 32px; 
            border-radius: 30px; font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 15px 40px rgba(16, 185, 129, 0.5); opacity: 0; 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 99999; 
            display: flex; align-items: center; gap: 10px;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ADAPTACIÓN MÓVIL ESTRICTA */
        @media (max-width: 768px) {
            body { padding: 20px 10px; }
            .dashboard-controls { flex-direction: column; gap: 15px; align-items: stretch; text-align: center; padding: 15px; }
            .controls-actions { flex-direction: column; gap: 10px;}
            .tabs-nav { padding-bottom: 10px; margin-bottom: 15px;}
            .tab-btn { padding: 8px 14px; font-size: 10px; }
            .lote-row { flex-direction: column; align-items: stretch; position: relative; padding: 20px 15px; }
            .lote-header-info { width: 100%; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding-right: 0; padding-bottom: 15px; margin-bottom: 5px; flex-direction: row; justify-content: space-between;}
            .lote-num-input { width: 80px; }
            .pin-badge { width: auto; padding: 8px 12px;}
            .lote-details { grid-template-columns: 1fr; width: 100%; }
            .col-span-2, .col-span-full { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="admin-header">
            <h1>Bóveda de Administración</h1>
            <p>Panel Comercial &bull; Conexión Segura</p>
        </div>

        <!-- PANTALLA DE LOGIN -->
        <div id="login-screen">
            <div class="input-group">
                <label>Usuario de GitHub</label>
                <input type="text" id="gh-user" placeholder="Ej: nombre-inmobiliaria">
            </div>
            <div class="input-group">
                <label>Nombre del Repositorio</label>
                <input type="text" id="gh-repo" placeholder="Ej: proyecto-valle">
            </div>
            <div class="input-group">
                <label>Llave Maestra (Token de Acceso)</label>
                <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxx">
            </div>
            <button class="btn-submit" id="btn-login" onclick="conectarBoveda()">Conectar a la Bóveda</button>
        </div>

        <!-- PANTALLA DE GESTIÓN -->
        <div id="dashboard-screen">
            <div class="dashboard-controls">
                <div class="user-info">Conectado como: <b id="display-user">--</b></div>
                <div class="controls-actions">
                    <button class="btn-logout" onclick="cerrarSesion()">Desconectar</button>
                    <button class="btn-save" id="btn-save-master" onclick="guardarCambios()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"></path><path d="M17 21v-8H7v8"></path><path d="M7 3v5h8V3"></path></svg>
                        Guardar Cambios
                    </button>
                </div>
            </div>

            <!-- TABS DE NAVEGACIÓN -->
            <div class="tabs-nav">
                <button class="tab-btn active" onclick="switchTab('tab-global')">Ajustes Globales</button>
                <button class="tab-btn" onclick="switchTab('tab-lotes')">Inventario Lotes & 360</button>
                <button class="tab-btn" onclick="switchTab('tab-horizontes')">Marcadores Horizonte</button>
            </div>
            
            <!-- TAB: AJUSTES GLOBALES -->
            <div id="tab-global" class="tab-section active">
                <div class="global-config-card">
                    <h3>Identidad del Proyecto</h3>
                    <div class="lote-details">
                        <div class="lote-field col-span-full">
                            <label>Nombre Principal del Proyecto (Título H1)</label>
                            <input type="text" id="config-titulo" placeholder="Ej: PROYECTO INMOBILIARIO">
                        </div>
                        <div class="lote-field col-span-full">
                            <label>Subtítulo / Bajada descriptiva</label>
                            <input type="text" id="config-subtitulo" placeholder="Ej: Terrenos de 5.000 m2 con vista al volcán">
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB: INVENTARIO (LOTES Y VISTAS 360) -->
            <div id="tab-lotes" class="tab-section">
                <div class="search-bar-container">
                    <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg>
                    <input type="text" id="search-lotes" placeholder="Buscar lote por título o número..." onkeyup="filtrarInventario('search-lotes', 'lotes-container')">
                </div>
                <div class="lotes-grid" id="lotes-container">
                    <!-- Dinámico -->
                </div>
            </div>

            <!-- TAB: MARCADORES HORIZONTE -->
            <div id="tab-horizontes" class="tab-section">
                <div class="search-bar-container">
                    <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg>
                    <input type="text" id="search-horizontes" placeholder="Buscar marcador..." onkeyup="filtrarInventario('search-horizontes', 'horizontes-container')">
                </div>
                <div class="lotes-grid" id="horizontes-container">
                    <!-- Dinámico -->
                </div>
            </div>

        </div>
    </div>

    <!-- ALERTA DE ÉXITO -->
    <div id="toast">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"></path><path d="M22 4L12 14.01l-3-3"></path></svg>
        Bóveda Actualizada
    </div>

    <script>
        // CONFIGURACIÓN CENTRAL
        const FILENAME = "datos.json";
        let shaActual = ""; 
        let masterData = {}; 

        // FUNCIONES SEGURAS DE MEMORIA LOCAL (Bypass file:// block)
        function safeGetStorage(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }
        function safeSetStorage(key, val) { try { localStorage.setItem(key, val); } catch(e) { console.warn("Modo local estricto detectado."); } }

        document.addEventListener("DOMContentLoaded", () => {
            const savedToken = safeGetStorage("masterplan_token");
            const savedUser = safeGetStorage("masterplan_user");
            const savedRepo = safeGetStorage("masterplan_repo");
            
            if (savedToken && savedUser && savedRepo) {
                document.getElementById('gh-user').value = savedUser;
                document.getElementById('gh-repo').value = savedRepo;
                document.getElementById('gh-token').value = savedToken;
            }
        });

        // TABS ENGINE
        function switchTab(tabId) {
            document.querySelectorAll('.tab-section').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        // BUSCADOR EN TIEMPO REAL
        function filtrarInventario(inputId, containerId) {
            const query = document.getElementById(inputId).value.toLowerCase();
            const rows = document.getElementById(containerId).querySelectorAll('.lote-row');
            
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                if (text.includes(query)) {
                    row.style.display = "flex";
                } else {
                    row.style.display = "none";
                }
            });
        }

        // 1. CONEXIÓN API BLINDADA
        async function conectarBoveda() {
            const user = document.getElementById('gh-user').value.trim();
            const repo = document.getElementById('gh-repo').value.trim();
            const token = document.getElementById('gh-token').value.trim();

            if(!user || !repo || !token) { alert("⚠️ Completa todos los campos para acceder."); return; }

            const btn = document.getElementById('btn-login');
            btn.innerText = "VERIFICANDO EN GITHUB...";
            btn.style.pointerEvents = "none";
            btn.style.opacity = "0.7";

            const url = `https://api.github.com/repos/${user}/${repo}/contents/${FILENAME}`;

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });

                if (response.ok) {
                    const jsonRes = await response.json();
                    shaActual = jsonRes.sha; 
                    
                    const contenidoDecodificado = decodeURIComponent(escape(atob(jsonRes.content)));
                    masterData = JSON.parse(contenidoDecodificado);

                    // Asegurar que la estructura exista
                    if(!masterData.configProyecto) masterData.configProyecto = {titulo: "", subtitulo: ""};
                    if(!masterData.lotes) masterData.lotes = [];
                    if(!masterData.horizontes) masterData.horizontes = [];

                    safeSetStorage("masterplan_user", user);
                    safeSetStorage("masterplan_repo", repo);
                    safeSetStorage("masterplan_token", token);

                    document.getElementById('login-screen').style.display = "none";
                    document.getElementById('dashboard-screen').style.display = "block";
                    document.getElementById('display-user').innerText = user;

                    renderUI();
                } else {
                    const errObj = await response.json();
                    alert(`⛔ ACCESO DENEGADO.\n\nEl servidor de GitHub respondió:\n"${errObj.message}"\n\n¿Subiste el archivo 'datos.json' a tu repositorio '${repo}'?`);
                    btn.innerText = "CONECTAR A LA BÓVEDA";
                    btn.style.pointerEvents = "auto";
                    btn.style.opacity = "1";
                }
            } catch (error) {
                alert("⚠️ Error de conexión. Revisa tu internet.");
                btn.innerText = "CONECTAR A LA BÓVEDA";
                btn.style.pointerEvents = "auto";
                btn.style.opacity = "1";
            }
        }

        // 2. RENDERIZADO DEL PANEL COMPLETO
        function renderUI() {
            // Render Global Config
            document.getElementById('config-titulo').value = masterData.configProyecto.titulo || "";
            document.getElementById('config-subtitulo').value = masterData.configProyecto.subtitulo || "";

            // Render Lotes y Vistas 360
            const containerLotes = document.getElementById('lotes-container');
            containerLotes.innerHTML = "";
            if(masterData.lotes.length === 0) {
                containerLotes.innerHTML = `<div style="text-align:center; color:#94a3b8; padding:20px;">No hay lotes configurados.</div>`;
            } else {
                masterData.lotes.forEach((lote) => {
                    const row = document.createElement('div');
                    row.className = "lote-row";
                    
                    if (lote.tipo === 'lote') {
                        let colorClass = lote.status === 'disponible' ? 'status-disp' : 
                                         lote.status === 'reservado' ? 'status-res' : 
                                         lote.status === 'vendido' ? 'status-vend' : 'status-nodisp';
                        
                        row.innerHTML = `
                            <div class="lote-header-info">
                                <input type="text" class="lote-num-input" data-id="${lote.id}" data-field="numero" value="${lote.numero || ''}" title="Número del Lote">
                                <div class="pin-badge badge-lote">LOTE</div>
                            </div>
                            <div class="lote-details">
                                <div class="lote-field col-span-2">
                                    <label>Identificador Público (Título)</label>
                                    <input type="text" data-id="${lote.id}" data-field="titulo" value="${lote.titulo || ''}">
                                </div>
                                <div class="lote-field">
                                    <label>Superficie</label>
                                    <input type="text" data-id="${lote.id}" data-field="superficie" value="${lote.superficie || ''}">
                                </div>
                                <div class="lote-field">
                                    <label>Precio de Venta</label>
                                    <input type="text" data-id="${lote.id}" data-field="precio" value="${lote.precio || ''}">
                                </div>
                                <div class="lote-field">
                                    <label>Estado Actual</label>
                                    <select data-id="${lote.id}" data-field="status" class="${colorClass}" onchange="this.className = this.options[this.selectedIndex].dataset.class">
                                        <option value="disponible" data-class="status-disp" ${lote.status === 'disponible' ? 'selected' : ''}>Disponible</option>
                                        <option value="reservado" data-class="status-res" ${lote.status === 'reservado' ? 'selected' : ''}>Reservado</option>
                                        <option value="vendido" data-class="status-vend" ${lote.status === 'vendido' ? 'selected' : ''}>Vendido</option>
                                        <option value="no_disponible" data-class="status-nodisp" ${lote.status === 'no_disponible' ? 'selected' : ''}>No Disp.</option>
                                    </select>
                                </div>
                                <div class="lote-field">
                                    <label>Tipo de Terreno</label>
                                    <select data-id="${lote.id}" data-field="terreno">
                                        <option value="Plano" ${lote.terreno === 'Plano' ? 'selected' : ''}>Plano</option>
                                        <option value="Pendiente Suave" ${lote.terreno === 'Pendiente Suave' ? 'selected' : ''}>Pendiente Suave</option>
                                        <option value="Pendiente Fuerte" ${lote.terreno === 'Pendiente Fuerte' ? 'selected' : ''}>Pendiente Fuerte</option>
                                        <option value="Quebrada" ${lote.terreno === 'Quebrada' ? 'selected' : ''}>Quebrada</option>
                                        <option value="Terraza" ${lote.terreno === 'Terraza' ? 'selected' : ''}>Terraza</option>
                                        <option value="Irregular" ${lote.terreno === 'Irregular' ? 'selected' : ''}>Irregular</option>
                                    </select>
                                </div>
                                <div class="lote-field col-span-full">
                                    <label>URL Imagen del Lote</label>
                                    <input type="text" data-id="${lote.id}" data-field="imagen" value="${lote.imagen || ''}" placeholder="Dejar vacío para imagen por defecto">
                                </div>
                                <div class="lote-field col-span-full">
                                    <label>URL Recorrido Virtual / YouTube</label>
                                    <input type="text" data-id="${lote.id}" data-field="videoUrl" value="${lote.videoUrl || ''}" placeholder="Opcional. Ej: https://youtu.be/...">
                                </div>
                            </div>
                        `;
                    } else if (lote.tipo === 'vista360') {
                        row.innerHTML = `
                            <div class="lote-header-info">
                                <div class="pin-badge badge-360" style="font-size:12px;">360°</div>
                            </div>
                            <div class="lote-details" style="grid-template-columns: 1fr;">
                                <div class="lote-field">
                                    <label>Nombre del Portal 360°</label>
                                    <input type="text" data-id="${lote.id}" data-field="titulo" value="${lote.titulo || ''}">
                                </div>
                                <div class="lote-field">
                                    <label>Enlace del Tour 360° Asociado</label>
                                    <input type="text" data-id="${lote.id}" data-field="url" value="${lote.url || ''}" placeholder="Ej: https://tudominio.com/tour360">
                                </div>
                            </div>
                        `;
                    }
                    containerLotes.appendChild(row);
                });
            }

            // Render Horizontes
            const containerHorizontes = document.getElementById('horizontes-container');
            containerHorizontes.innerHTML = "";
            if(masterData.horizontes.length === 0) {
                containerHorizontes.innerHTML = `<div style="text-align:center; color:#94a3b8; padding:20px;">No hay marcadores de horizonte.</div>`;
            } else {
                masterData.horizontes.forEach((horiz) => {
                    const row = document.createElement('div');
                    row.className = "lote-row";
                    row.innerHTML = `
                        <div class="lote-header-info">
                            <div class="pin-badge badge-horiz" style="font-size:10px;">HORIZ</div>
                        </div>
                        <div class="lote-details" style="grid-template-columns: repeat(3, 1fr);">
                            <div class="lote-field">
                                <label>Destino / Ciudad</label>
                                <input type="text" data-id="${horiz.id}" data-field="titulo" value="${horiz.titulo || ''}">
                            </div>
                            <div class="lote-field">
                                <label>Distancia Fija</label>
                                <input type="text" data-id="${horiz.id}" data-field="distancia" value="${horiz.distancia || ''}" placeholder="Ej: 15 KM">
                            </div>
                            <div class="lote-field">
                                <label>Tiempo Estimado</label>
                                <input type="text" data-id="${horiz.id}" data-field="tiempo" value="${horiz.tiempo || ''}" placeholder="Ej: 20 MIN">
                            </div>
                        </div>
                    `;
                    containerHorizontes.appendChild(row);
                });
            }
        }

        // 3. ACTUALIZACIÓN A GITHUB CON PROTECCIÓN ESPACIAL
        async function guardarCambios() {
            const btn = document.getElementById('btn-save-master');
            btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite; transform-origin: center;"/></svg> PROCESANDO...`;
            btn.style.pointerEvents = "none";
            btn.style.opacity = "0.7";

            // Guardar Variables Globales
            masterData.configProyecto.titulo = document.getElementById('config-titulo').value.trim();
            masterData.configProyecto.subtitulo = document.getElementById('config-subtitulo').value.trim();

            // Rastrear todos los inputs de Lotes y Vistas 360
            const loteInputs = document.querySelectorAll('#tab-lotes [data-id]');
            loteInputs.forEach(input => {
                const id = input.getAttribute('data-id');
                const field = input.getAttribute('data-field');
                const val = input.value;
                const index = masterData.lotes.findIndex(l => l.id === id);
                
                if(index !== -1) {
                    if (field === 'videoUrl' || field === 'url' || field === 'imagen') {
                        if (val.trim() === '') { delete masterData.lotes[index][field]; } 
                        else { masterData.lotes[index][field] = val.trim(); }
                    } else {
                        masterData.lotes[index][field] = val;
                    }
                }
            });

            // Rastrear todos los inputs de Horizontes
            const horizInputs = document.querySelectorAll('#tab-horizontes [data-id]');
            horizInputs.forEach(input => {
                const id = input.getAttribute('data-id');
                const field = input.getAttribute('data-field');
                const val = input.value;
                const index = masterData.horizontes.findIndex(h => h.id === id);
                if(index !== -1) {
                    masterData.horizontes[index][field] = val;
                }
            });

            // Empaquetar a GitHub
            const jsonString = JSON.stringify(masterData, null, 2);
            const contentEncoded = btoa(unescape(encodeURIComponent(jsonString)));

            const user = safeGetStorage("masterplan_user");
            const repo = safeGetStorage("masterplan_repo");
            const token = safeGetStorage("masterplan_token");
            const url = `https://api.github.com/repos/${user}/${repo}/contents/${FILENAME}`;

            const payload = {
                message: "🏢 Actualización de Bóveda: Textos e Inventario",
                content: contentEncoded,
                sha: shaActual 
            };

            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const result = await response.json();
                    shaActual = result.content.sha; 
                    mostrarToast();
                } else {
                    const err = await response.json();
                    alert("⛔ Error al guardar: " + err.message);
                }
            } catch (error) {
                alert("⚠️ Error crítico de conexión. Revisa tu internet.");
            }

            btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"></path><path d="M17 21v-8H7v8"></path><path d="M7 3v5h8V3"></path></svg> GUARDAR CAMBIOS`;
            btn.style.pointerEvents = "auto";
            btn.style.opacity = "1";
        }

        function mostrarToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 4000);
        }

        function cerrarSesion() {
            try {
                localStorage.removeItem("masterplan_user");
                localStorage.removeItem("masterplan_repo");
                localStorage.removeItem("masterplan_token");
            } catch(e) {}
            location.reload();
        }
    </script>
</body>
</html>
